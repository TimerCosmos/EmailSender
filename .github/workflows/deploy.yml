name: Deploy to Cloud Run

# Required GitHub secrets: GCP_SA_KEY, GCP_PROJECT_ID

on:
  push:
    branches:
      - main
    paths:
      - "server.js"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      email_sender: ${{ steps.filter.outputs.email_sender }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect changed service paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            email_sender:
              - 'server.js'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'
              - '.dockerignore'

  deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.email_sender == 'true'
    env:
      REGION: asia-south1
      REPOSITORY: emailsender-repo
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SERVICE_NAME: spacewar-emailsender
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build email-sender image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA} .

      - name: Push email-sender image
        run: |
          docker push asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA}

      - name: Deploy email-sender
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image asia-south1-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA} \
            --region ${REGION} \
            --platform managed \
            --allow-unauthenticated
